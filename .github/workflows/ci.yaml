name: Continuous Integration

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
    paths:
      - 'src/**'
      - 'pom.xml'
  pull_request:
    branches:
      - 'main'   # Toutes les PR ciblent main directement
    types: [ opened, synchronize, reopened, closed ]
    paths:
      - 'src/**'
      - 'pom.xml'

permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write

jobs:

  build:
    name: Compile & Essai
    runs-on: ubuntu-latest
    steps:
      - name: Clône
        uses: actions/checkout@v4
      - name: Mise en place de Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Compile & Essais
        run: mvn verify --no-transfer-progress
      - name: Rapport d'essai JUnit
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true
      - name: Téléversement du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  docker:
    name: Compile et pousse sur le registre de conteneurs GitHub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Clône
        uses: actions/checkout@v4
      - name: Mise en place de Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Authentification au registre de conteneur Github
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Génère les métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=pr-${{ github.event.pull_request.number }}
      - name: Compilation de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Résumé de l'image
        run: |
          echo "## 🐳 Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

