<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortress — Hors ligne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { ctp: {
                            base:'#1e1e2e', surface0:'#313244', overlay1:'#7f849c',
                            text:'#cdd6f4', mauve:'#cba6f7', crust:'#11111b'
                        }}}}
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-ctp-base text-ctp-text font-nunito min-h-screen flex items-center justify-center">
<div class="flex flex-col items-center text-center px-6">
    <div class="w-16 h-16 rounded-2xl bg-ctp-surface0 flex items-center justify-center text-3xl mb-6">📡</div>
    <h1 class="text-2xl font-bold text-ctp-text mb-2">Vous êtes hors ligne</h1>
    <p class="text-sm text-ctp-overlay1 max-w-xs mb-8">Vérifiez votre connexion internet et réessayez.</p>
    <button onclick="window.location.reload()"
            class="text-sm font-bold px-6 py-3 rounded-xl bg-ctp-mauve text-ctp-crust hover:opacity-85 transition-opacity">
        Réessayer
    </button>
</div>
</body>
</html>
